services:

  # ── Base de datos PostgreSQL ─────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tanques
      POSTGRES_PASSWORD: tanques
      POSTGRES_DB: tanques_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432" # expuesto para conectarse con prisma studio / pgAdmin
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tanques -d tanques_db" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend NestJS ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://tanques:tanques@db:5432/tanques_db
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    # Ejecutar migraciones + seed antes de arrancar el servidor
    command: >
      sh -c "
        echo '⏳ Aplicando migraciones...' &&
        npx prisma migrate deploy &&
        echo '🌱 Ejecutando seed...' &&
        npx ts-node prisma/seed.ts &&
        echo '🚀 Iniciando servidor...' &&
        node dist/main.js
      "

  # ── Frontend React (nginx) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80" # acceder en http://localhost:5173
    depends_on:
      - backend

volumes:
  pgdata:
